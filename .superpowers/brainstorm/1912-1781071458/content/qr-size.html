<h2>QR 码大小 — 顶部焦点多大？</h2>
<p class="subtitle">竖式工牌里 QR 码是第一个视觉锚点。当前横式是 140-180px。</p>

<div class="options">
  <div class="option" data-choice="large" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>大 QR — 160px</h3>
      <p>扫描友好，视觉冲击强。适合远距离扫码，像工牌上的大照片。</p>
      <div style="background:#111;border-radius:18px;padding:24px 18px;max-width:190px;margin:12px auto 0;display:flex;flex-direction:column;align-items:center;gap:8px">
        <div style="background:#fff;width:110px;height:110px;border-radius:10px;font-size:10px;display:flex;align-items:center;justify-content:center;color:#999">QR 160px</div>
        <div style="font-size:15px;font-weight:700;color:#f0efe9">张小明</div>
        <div style="font-size:10px;color:#d4a853">产品经理</div>
      </div>
    </div>
  </div>
  <div class="option" data-choice="medium-qr" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>中等 QR — 130px</h3>
      <p>均衡比例，QR 和信息区各占一半视觉重量。最像标准工牌。</p>
      <div style="background:#111;border-radius:18px;padding:24px 18px;max-width:190px;margin:12px auto 0;display:flex;flex-direction:column;align-items:center;gap:8px">
        <div style="background:#fff;width:90px;height:90px;border-radius:10px;font-size:10px;display:flex;align-items:center;justify-content:center;color:#999">QR 130px</div>
        <div style="font-size:15px;font-weight:700;color:#f0efe9">张小明</div>
        <div style="font-size:10px;color:#d4a853">产品经理</div>
      </div>
    </div>
  </div>
  <div class="option" data-choice="small-qr" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>小 QR — 100px</h3>
      <p>名字是第一焦点，QR 低调在顶。偏优雅，信息层级更清晰。</p>
      <div style="background:#111;border-radius:18px;padding:24px 18px;max-width:190px;margin:12px auto 0;display:flex;flex-direction:column;align-items:center;gap:8px">
        <div style="background:#fff;width:70px;height:70px;border-radius:10px;font-size:10px;display:flex;align-items:center;justify-content:center;color:#999">QR 100px</div>
        <div style="font-size:15px;font-weight:700;color:#f0efe9">张小明</div>
        <div style="font-size:10px;color:#d4a853">产品经理</div>
      </div>
    </div>
  </div>
</div>
